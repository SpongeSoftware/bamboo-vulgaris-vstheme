<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="#252623"/>

  <!-- Bamboo stalk left -->
  <rect x="34" y="18" width="12" height="84" rx="4" fill="#8fb573"/>
  <!-- Nodes left -->
  <rect x="32" y="38" width="16" height="5" rx="2.5" fill="#6a9957"/>
  <rect x="32" y="62" width="16" height="5" rx="2.5" fill="#6a9957"/>
  <rect x="32" y="86" width="16" height="5" rx="2.5" fill="#6a9957"/>

  <!-- Bamboo stalk right -->
  <rect x="74" y="30" width="12" height="72" rx="4" fill="#8fb573"/>
  <!-- Nodes right -->
  <rect x="72" y="50" width="16" height="5" rx="2.5" fill="#6a9957"/>
  <rect x="72" y="74" width="16" height="5" rx="2.5" fill="#6a9957"/>
  <rect x="72" y="98" width="16" height="5" rx="2.5" fill="#6a9957"/>

  <!-- Leaf left stalk (from left stalk, node at 38) -->
  <line x1="46" y1="41" x2="68" y2="28" stroke="#8fb573" stroke-width="3" stroke-linecap="round"/>
  <!-- Leaf left -->
  <ellipse cx="72" cy="24" rx="12" ry="5" fill="#8fb573" transform="rotate(-30 72 24)"/>

  <!-- Leaf right (from right stalk, node at 50) -->
  <line x1="74" y1="53" x2="52" y2="40" stroke="#8fb573" stroke-width="3" stroke-linecap="round"/>
  <!-- Leaf right -->
  <ellipse cx="48" cy="36" rx="12" ry="5" fill="#8fb573" transform="rotate(30 48 36)"/>

  <!-- Leaf left lower (from left stalk, node at 62) -->
  <line x1="46" y1="65" x2="66" y2="55" stroke="#8fb573" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="70" cy="52" rx="11" ry="4.5" fill="#6a9957" transform="rotate(-25 70 52)"/>
</svg>
