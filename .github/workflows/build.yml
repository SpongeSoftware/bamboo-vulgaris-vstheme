name: Build VSIX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to VS Marketplace"
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add NuGet to PATH
        uses: nuget/setup-nuget@v2
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Restore NuGet packages
        run: nuget restore BambooVulgaris.csproj -PackagesDirectory packages
      - name: Stamp version from CHANGELOG
        shell: pwsh
        run: |
          $v = python tools/set_version.py
          if (-not $v) { throw "Could not determine version from CHANGELOG.md" }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building version $v"
      - name: Build VSIX
        run: msbuild BambooVulgaris.csproj /p:Configuration=Release /p:DeployExtension=false
      - name: Verify theme compiled into pkgdef
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path bin/Release -Filter *.vsix | Select-Object -First 1
          if (-not $vsix) { throw "No .vsix produced" }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($vsix.FullName)
          try {
            $pkg = $zip.Entries | Where-Object { $_.FullName -like "*.pkgdef" } | Select-Object -First 1
            if (-not $pkg) { throw "No .pkgdef inside the VSIX — theme was not compiled" }
            $reader = New-Object System.IO.StreamReader($pkg.Open())
            $text = $reader.ReadToEnd(); $reader.Close()
            if ($text -notmatch '"Data"=hex:') {
              throw "pkgdef has no compiled color data (no Data=hex blobs) — theme would render light"
            }
            Write-Host "OK: $($pkg.FullName) contains compiled color data."
          } finally { $zip.Dispose() }
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bamboo-vulgaris-${{ env.VERSION }}
          path: bin/Release/BambooVulgaris.ColorTheme.vsix
      - name: Publish to Marketplace
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish }}
        run: |
          $vsix = Get-ChildItem -Recurse -Filter *.vsix | Select-Object -First 1
          & "${env:VSINSTALLDIR}\VSSDK\VisualStudioIntegration\Tools\Bin\VsixPublisher.exe" publish -payload "$($vsix.FullName)" -publishManifest "vs-publish.json" -personalAccessToken "${{ secrets.VS_MARKETPLACE_PAT }}"
